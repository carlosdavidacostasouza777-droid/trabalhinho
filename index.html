<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineLog - Catálogo de Filmes</title>
  <link rel="stylesheet" href="ixtilo.css" />
</head>
<body>

  <header class="header">
    <div class="header__logo">
      <span class="logo-icon">🎬</span>
      <h1>CineLog</h1>
    </div>
    <nav class="header__nav">
      <a href="#" class="nav-link active">Início</a>
      <a href="#" class="nav-link">Gêneros</a>
      <a href="#" class="nav-link">Favoritos</a>
    </nav>
  </header>

  <main class="main">
    <section class="search-section">
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Buscar filmes..."
      />
      <select id="genreFilter" class="filter-select">
        <option value="">Todos os gêneros</option>
        <option value="acao">Ação</option>
        <option value="drama">Drama</option>
        <option value="comedia">Comédia</option>
        <option value="ficcao">Ficção Científica</option>
        <option value="terror">Terror</option>
        <option value="fantasia">Fantasia</option>
        <option value="animacao">Animação</option>
        <option value="musical">Musical</option>
      </select>
    </section>

    <section class="movies-section">
      <h2 class="section-title">Filmes em Destaque</h2>
      <div class="movies-grid" id="moviesGrid"></div>
    </section>
  </main>
  <footer class="footer">
    <p>Feito com os garotos de front &copy;</p>
  </footer>
<script src="ds_fixed.js"></script>
</body>
</html>
